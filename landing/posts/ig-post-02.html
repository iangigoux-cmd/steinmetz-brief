<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steinmetz — Instagram Post 02</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #E0E0E0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    background: #171717;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* --- Top bar --- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 36px 64px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .logo {
    font-family: 'Fira Code', monospace;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: #FFFFFF;
  }

  .logo-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #2563EB;
    margin-left: 8px;
    vertical-align: middle;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Fira Code', monospace;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.3);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22C55E;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* --- Main --- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 64px;
    gap: 56px;
  }

  .metric {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  .metric-number {
    font-family: 'Fira Code', monospace;
    font-weight: 600;
    font-size: 120px;
    line-height: 1;
    color: #2563EB;
    letter-spacing: -0.04em;
  }

  .metric-unit {
    font-family: 'Fira Code', monospace;
    font-weight: 400;
    font-size: 34px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.05em;
  }

  .hook {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 52px;
    line-height: 1.1;
    color: #FFFFFF;
    letter-spacing: -0.03em;
    max-width: 820px;
  }

  .sub {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding-left: 4px;
  }

  .divider {
    width: 64px;
    height: 2px;
    background: #2563EB;
  }

  .tagline {
    font-family: 'Fira Code', monospace;
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.04em;
    line-height: 1.7;
  }

  /* --- Bottom bar --- */
  .bottombar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 36px 64px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .cta {
    font-family: 'Fira Code', monospace;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: #2563EB;
  }

  .ref {
    font-family: 'Fira Code', monospace;
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.05em;
  }

  /* --- Vertical accent --- */
  .canvas::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    background: #2563EB;
  }

  @media (max-width: 1080px) {
    body { display: block; min-height: auto; overflow: hidden; }
    .canvas { transform-origin: top left; }
  }
</style>
</head>
<body>

<div class="canvas">

  <div class="topbar">
    <span class="logo">STEINMETZ<span class="logo-dot"></span></span>
    <span class="status"><span class="status-dot"></span> BUILDING</span>
  </div>

  <div class="main">
    <div class="metric">
      <span class="metric-number">90%</span>
      <span class="metric-unit">OF AI PROJECTS</span>
    </div>
    <h1 class="hook">never make it to production.<br>Yours will.</h1>
    <div class="sub">
      <div class="divider"></div>
      <p class="tagline">We handle the infrastructure nobody<br>sees — so your agents actually ship.</p>
    </div>
  </div>

  <div class="bottombar">
    <span class="cta">STEINMETZ.AI &rarr;</span>
    <span class="ref">AI INFRASTRUCTURE AS A SERVICE</span>
  </div>

</div>

<script>
(function() {
  var c = document.querySelector('.canvas');
  function fit() {
    var s = Math.min(1, window.innerWidth / 1080);
    c.style.transform = 'scale(' + s + ')';
    document.body.style.height = (1080 * s) + 'px';
  }
  fit();
  window.addEventListener('resize', fit);
})();
</script>
</body>
</html>
